# Development profile
spring:
  devtools:
    restart:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}

# ── CMS (dev overrides) ──
cms:
  base-url: ${CMS_BASE_URL:http://localhost:8083/api}
  upload:
    root-directory: ${CMS_UPLOAD_DIR:${user.home}/Data/gjp-api/upload}

# Logging configuration
logging:
  level:
    org.ganjp.api: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
